<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Personalizowane Sekcje</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      /* Usunięto ukrywanie sekcji i animacje */
    </style>
  </head>
  <body>
    <!-- Sekcje są teraz zawsze widoczne -->
    <div class="scroll-progress" aria-hidden="true">
      <div class="scroll-progress-bar" id="scroll-progress-bar"></div>
    </div>

    <!-- ============================================== SEKCJA HERO ============================================== -->
    <section class="section h-90vh bg-slider" id="hero-start">
      <nav class="top-menu">
        <div class="top-menu-inner">
          <div class="menu-left">
            <span class="menu-item">koncept</span>
            <span class="menu-item">miejsca</span>
            <span class="menu-item">rezerwuj</span>
          </div>
          <div class="menu-right">
            <a
              href="#"
              class="lang-icon"
              title="Polski"
              style="
                display: inline-block;
                width: 22px;
                color: currentcolor;
                opacity: 1;
                margin-right: 10px;
              "
            >
              <svg
                viewBox="0 0 20 12"
                width="22"
                height="13"
                xmlns="http://www.w3.org/2000/svg"
                style="vertical-align: middle"
              >
                <rect
                  width="20"
                  height="12"
                  fill="transparent"
                  stroke="currentColor"
                  stroke-width="2"
                />
                <rect width="20" height="6" y="6" fill="currentColor" />
              </svg>
            </a>
            <a
              href="#"
              class="lang-icon"
              title="English"
              style="
                display: inline-block;
                width: 22px;
                color: currentcolor;
                opacity: 0.3;
              "
            >
              <svg
                viewBox="0 0 20 12"
                width="22"
                height="13"
                xmlns="http://www.w3.org/2000/svg"
                style="vertical-align: middle"
              >
                <rect
                  width="20"
                  height="12"
                  fill="transparent"
                  stroke="currentColor"
                  stroke-width="2"
                />
                <path
                  d="M0,0 L20,12 M20,0 L0,12"
                  stroke="currentColor"
                  stroke-width="1.5"
                  fill="none"
                />
                <path
                  d="M10,0 L10,12 M0,6 L20,6"
                  stroke="currentColor"
                  stroke-width="2.5"
                  fill="none"
                />
              </svg>
            </a>
          </div>
        </div>
      </nav>
      <div class="container">
        <h2>STARTOWY HERO - Sekcja 1</h2>
        <p>Wszystkie zbędne widoki zostały usunięte.</p>
      </div>
    </section>

    <!-- ============================================== STAŁE SEKCJE ============================================== -->

    <section class="section h-90vh bg-secondary" id="sec2-wrapper">
      <div class="container">
        <h2>Sekcja 2</h2>
        <p>Wszystkie sekcje są teraz statyczne i uproszczone.</p>
      </div>
    </section>

    <section class="section h-90vh bg-dark" id="sec3-wrapper">
      <div class="container">
        <h2>Sekcja 3</h2>
        <p>Treść rozszerzona została usunięta.</p>
      </div>
    </section>

    <section class="section h-35vh bg-light">
      <div class="container">
        <h2>Stopka - Sekcja 4</h2>
        <p>Zawsze na samym dole.</p>
      </div>
    </section>
  </body>
</html>
